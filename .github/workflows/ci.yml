name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
    devel:
      runs-on: ubuntu-latest
      container:
        image: apnpucky/gentoo-hepi
      steps:
        - uses: APN-Pucky/make-python-action@main
          with:
            test: true
            doc: true
            coveralls: true
            codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
            test-gh-pages: true
            gh-pages-folder: docs/build/html
